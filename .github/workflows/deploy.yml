name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  # Opt-in to Node.js 24 for GitHub Actions to silence the deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      VITE_SHEET_NAME: ${{ secrets.SHEET_NAME }}
      VITE_GAMEJAMSHEET_NAME_GAMES: ${{ secrets.GAMEJAMSHEET_NAME_GAMES }}
      VITE_GAMEJAMSHEET_NAME_SETTINGS: ${{ secrets.GAMEJAMSHEET_NAME_SETTINGS }}
      VITE_GAMEJAMSHEET_ID: ${{ secrets.GAMEJAMSHEET_ID }}
      VITE_SPACETIMEDB_URI: ${{ secrets.SPACETIMEDB_URI }}
      VITE_SPACETIMEDB_MODULE_NAME: ${{ secrets.SPACETIMEDB_MODULE_NAME }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Updating to Node.js 22 (Current LTS) or you can use '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4